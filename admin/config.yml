backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "hero"
    label: "首页英雄区"
    folder: "content"
    create: false
    slug: "hero"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "大标题", name: "body", widget: "markdown" }

  - name: "about"
    label: "关于我们"
    folder: "content"
    create: false
    slug: "about"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "内容", name: "body", widget: "markdown" }

  - name: "services"
    label: "服务项目"
    folder: "content"
    create: false
    slug: "services"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "服务列表", name: "body", widget: "markdown" }

  - name: "contact"
    label: "联系方式"
    folder: "content"
    create: false
    slug: "contact"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "联系信息", name: "body", widget: "markdown" }
